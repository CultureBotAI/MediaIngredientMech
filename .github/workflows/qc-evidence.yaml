name: QC — evidence reference validation

on:
  pull_request:
    branches: [main]
    paths:
      - "data/ingredients/**/*.yaml"
      - "references_cache/**"
      - "src/mediaingredientmech/schema/mediaingredientmech.yaml"
  push:
    branches: [main]
    paths:
      - "data/ingredients/**/*.yaml"
      - "references_cache/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MIM
        uses: actions/checkout@v4
        with:
          path: MediaIngredientMech

      - name: Checkout claw (for validator)
        uses: actions/checkout@v4
        with:
          repository: CultureBotAI/culturebotai-claw
          path: culturebotai-claw
          # CLAW_READ_TOKEN is a fine-grained PAT with Contents:Read on
          # CultureBotAI/culturebotai-claw, set as an Actions secret on
          # this repo. The default GITHUB_TOKEN can't read the private
          # sibling.
          token: ${{ secrets.CLAW_READ_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate evidence references
        env:
          MEDIAINGREDIENTMECH_ROOT: ${{ github.workspace }}/MediaIngredientMech
        run: |
          cd culturebotai-claw
          python3 scripts/validate_evidence_references.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-validation-${{ github.run_id }}
          path: |
            culturebotai-claw/workspace/reports/evidence_reference_validation.tsv
            culturebotai-claw/workspace/reports/evidence_reference_validation.md
          if-no-files-found: warn
