# MIM knowledge-gap scan config — drives kg_microbe_kgscan (in culturebotai-claw).
# Europe PMC (free) per-record gap-signal search over mapped ingredient records.
repo_name: MediaIngredientMech
record_glob: ../data/ingredients/mapped/*.yaml
name_fields: [preferred_term, name]
synonym_field: synonyms
id_field: identifier
discussions_field: discussions
topic_context_terms: ["microbial", "bacteria", "metabolism", "growth medium", "biosynthesis"]
min_score: 8
