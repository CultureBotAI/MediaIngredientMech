id: https://w3id.org/mediaingredientmech
name: mediaingredientmech-schema
title: MediaIngredientMech Schema
description: >-
  LinkML schema for curating media ingredient ontology mappings with LLM assistance tracking.
  Provides structured workflow for mapping ingredients to CHEBI/FOODON terms with full audit trails.

license: MIT
see_also:
  - https://github.com/KG-Hub/MediaIngredientMech
  - https://github.com/KG-Hub/CultureMech

prefixes:
  linkml: https://w3id.org/linkml/
  mediaingredientmech: https://w3id.org/mediaingredientmech/
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  FOODON: http://purl.obolibrary.org/obo/FOODON_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MESH: http://id.nlm.nih.gov/mesh/
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  ENVO: http://purl.obolibrary.org/obo/ENVO_

default_prefix: mediaingredientmech
default_range: string

imports:
  - linkml:types

classes:
  IngredientCollection:
    tree_root: true
    description: Root container for all ingredient records
    attributes:
      generation_date:
        range: datetime
        description: Timestamp when this collection was generated
      total_count:
        range: integer
        description: Total number of ingredient records
      mapped_count:
        range: integer
        description: Number of mapped ingredients
      unmapped_count:
        range: integer
        description: Number of unmapped ingredients
      ingredients:
        range: IngredientRecord
        multivalued: true
        inlined_as_list: true
        description: List of all ingredient records

  IngredientRecord:
    tree_root: true
    description: >-
      Core record for a media ingredient with ontology mapping, synonyms, and curation history.
      Represents either a mapped ingredient (with ontology_id) or unmapped ingredient (needs curation).
      Can serve as root element for individual YAML files or as elements in IngredientCollection.
    attributes:
      ontology_id:
        identifier: true
        required: true
        description: >-
          Unique ontology identifier - either ontology ID (e.g., CHEBI:26710) for mapped ingredients
          or generated placeholder (e.g., UNMAPPED_001) for unmapped ingredients
      preferred_term:
        required: true
        description: Canonical name for this ingredient
      ontology_mapping:
        range: OntologyMapping
        description: Ontology term mapping (CHEBI/FOODON)
      synonyms:
        range: IngredientSynonym
        multivalued: true
        inlined_as_list: true
        description: Alternative names and raw text variants
      mapping_status:
        range: MappingStatusEnum
        required: true
        description: Current mapping status
      occurrence_statistics:
        range: OccurrenceStats
        description: Usage statistics across media recipes
      curation_history:
        range: CurationEvent
        multivalued: true
        inlined_as_list: true
        description: Audit trail of all curation actions
      notes:
        description: Free-text curation notes
      media_roles:
        range: RoleAssignment
        multivalued: true
        inlined_as_list: true
        description: Functional roles in growth medium formulation (e.g., NITROGEN_SOURCE, BUFFER)
      cellular_roles:
        range: CellularRoleAssignment
        multivalued: true
        inlined_as_list: true
        description: Cellular/metabolic roles in organism metabolism (e.g., PRIMARY_DEGRADER, ELECTRON_DONOR)
      solution_type:
        range: SolutionTypeEnum
        description: Type of solution if this is a stock/pre-mix rather than individual chemical
      chemical_properties:
        range: ChemicalProperties
        description: Chemical structure and properties (for CHEBI-mapped ingredients only)
      representative:
        description: >-
          ID of the representative record if this record has been merged.
          Only set when mapping_status is REJECTED due to merge.
          Points to the canonical record representing this ingredient.
        pattern: "^MediaIngredientMech:[0-9]{6}$"
      merged:
        multivalued: true
        description: >-
          List of MediaIngredientMech IDs merged into this representative.
          Only set on records serving as merge targets.
          Tracks all records consolidated into this canonical representation.
        pattern: "^MediaIngredientMech:[0-9]{6}$"
      ingredient_type:
        range: IngredientTypeEnum
        description: >-
          Classification of entry type: single chemical ingredient vs complex defined medium.
          SINGLE_INGREDIENT: Pure chemical (NaCl, agar, glucose).
          DEFINED_MEDIUM: Complete medium formulation/recipe (R2A agar, LB broth).
          UNDEFINED_MIXTURE: Complex mixture of unknown composition (yeast extract, peptone).
          STOCK_SOLUTION: Pre-mixed solution of defined ingredients.
      culturemech_medium_name:
        description: >-
          Cross-reference to CultureMech medium name if this is a defined medium.
          Used to link complex media entries to their full recipe formulations.
      parent_ingredient:
        description: >-
          Reference to parent ingredient in hierarchy (MediaIngredientMech:XXXXXX).
          Used for variants: purity levels (tap/distilled/double-distilled water),
          hydrates (CaCl2·2H2O vs CaCl2), stereoisomers (D-glucose vs L-glucose).
          Enables queries like "find all media using any form of water".
        pattern: "^MediaIngredientMech:[0-9]{6}$"
      child_ingredients:
        multivalued: true
        description: >-
          List of child ingredient IDs in hierarchy.
          Parent record contains all children (e.g., Water → Tap water, Distilled water).
          Used to navigate hierarchy and query all variants.
        pattern: "^MediaIngredientMech:[0-9]{6}$"
      variant_type:
        range: VariantTypeEnum
        description: >-
          Classification of variant relationship to parent.
          Indicates why this ingredient is distinct from parent/siblings.
          Examples: PURIFIED (distilled), ULTRA_PURIFIED (double distilled), TAP (impure).
      variant_notes:
        description: >-
          Human-readable explanation of variant distinction from parent/siblings.
          Example: "Higher purity (10x, <0.1 µS/cm vs <1 µS/cm) than standard distilled water.
          Used for trace-metal sensitive work."
      role_inheritance:
        range: boolean
        description: >-
          If true, inherits media_roles from parent ingredient.
          Allows child variants to automatically get parent's roles while enabling
          variant-specific role overrides or restrictions.

  OntologyMapping:
    description: Mapping to an ontology term (CHEBI, FOODON, etc.)
    attributes:
      ontology_id:
        required: true
        description: Ontology term ID in CURIE format (e.g., CHEBI:26710)
        pattern: "^[A-Z]+:[0-9]+$"
      ontology_label:
        required: true
        description: Human-readable label for the term
      ontology_source:
        range: OntologySourceEnum
        required: true
        description: Source ontology
      mapping_quality:
        range: MappingQualityEnum
        required: true
        description: Quality assessment of this mapping
      match_level:
        range: MatchLevelEnum
        description: Technical method used to find this mapping
      evidence:
        range: MappingEvidence
        multivalued: true
        inlined_as_list: true
        description: Evidence supporting this mapping

  ChemicalProperties:
    description: Chemical structure and properties for CHEBI-mapped ingredients
    attributes:
      cas_rn:
        description: >-
          Chemical Abstracts Service Registry Number (CAS-RN) in format XXX-XX-X or XXXX-XX-X.
          Primary chemical identifier used in regulatory and commercial contexts.
          Retrieved from CultureBotHT/MicroMediaParam mappings or external databases.
        pattern: "^\\d+-\\d+-\\d+$"
      molecular_formula:
        description: Molecular formula (e.g., H2O, C6H12O6)
      smiles:
        description: Simplified Molecular Input Line Entry System notation
      inchi:
        description: IUPAC International Chemical Identifier
      molecular_weight:
        range: float
        description: Molecular weight in g/mol
      data_source:
        description: Source of chemical properties (e.g., ChEBI, PubChem, CultureBotHT/MicroMediaParam)
      retrieval_date:
        range: datetime
        description: When these properties were retrieved

  MappingEvidence:
    description: Evidence for an ontology mapping
    attributes:
      evidence_type:
        range: EvidenceTypeEnum
        required: true
        description: Type of evidence
      source:
        description: Source of evidence (e.g., database name, curator name)
      confidence_score:
        range: float
        description: Confidence score (0.0-1.0)
      notes:
        description: Additional context

  IngredientSynonym:
    description: Alternative name or raw text variant for an ingredient
    attributes:
      synonym_text:
        required: true
        description: The synonym text
      synonym_type:
        range: SynonymTypeEnum
        description: Type of synonym
      source:
        description: Where this synonym came from (e.g., database, curator)
      occurrence_count:
        range: integer
        description: Number of times this variant appears

  OccurrenceStats:
    description: Statistics about ingredient usage across media
    attributes:
      total_occurrences:
        range: integer
        required: true
        description: Total number of occurrences across all media
      media_count:
        range: integer
        required: true
        description: Number of unique media containing this ingredient
      sample_media:
        multivalued: true
        description: Sample media names (for reference)
      concentration_range:
        description: Observed concentration range (if available)

  CurationEvent:
    description: Audit trail entry for a curation action
    attributes:
      timestamp:
        range: datetime
        required: true
        description: When this action occurred
      curator:
        required: true
        description: Who performed this action (username or system)
      action:
        range: CurationActionEnum
        required: true
        description: Type of curation action
      changes:
        description: Description of what changed
      previous_status:
        range: MappingStatusEnum
        description: Status before this action
      new_status:
        range: MappingStatusEnum
        description: Status after this action
      llm_assisted:
        range: boolean
        description: Whether LLM assistance was used
      llm_model:
        description: LLM model identifier (if llm_assisted=true)
      notes:
        description: Additional context for this action

  RoleCitation:
    description: Citation supporting a role assignment (DOI, publication, database reference)
    attributes:
      doi:
        description: Digital Object Identifier (e.g., 10.1128/jb.00123-15)
        pattern: "^10\\.\\d{4,}/[-._;()/:A-Za-z0-9]+$"
      pmid:
        description: PubMed ID for MEDLINE citations
      reference_text:
        description: Human-readable citation text
      reference_type:
        range: CitationTypeEnum
        description: Type of reference (peer-reviewed, database, manual curation, etc.)
      url:
        range: uri
        description: Web URL for the reference
      excerpt:
        description: Relevant excerpt or quote from the source
      curator_note:
        description: Curator's explanation of why this supports the role assignment

  RoleAssignment:
    description: Assignment of a functional role in growth medium formulation with supporting evidence
    attributes:
      role:
        range: IngredientRoleEnum
        required: true
        description: The functional role (e.g., NITROGEN_SOURCE, BUFFER, MINERAL)
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

  CellularRoleAssignment:
    description: Assignment of a cellular/metabolic role in organism metabolism with supporting evidence
    attributes:
      role:
        range: CellularRoleEnum
        required: true
        description: The cellular/metabolic role (e.g., PRIMARY_DEGRADER, ELECTRON_DONOR)
      metabolic_context:
        description: Pathway or metabolic context (e.g., "denitrification", "aromatic degradation")
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

enums:
  MappingStatusEnum:
    permissible_values:
      MAPPED:
        description: Has valid ontology mapping
      UNMAPPED:
        description: No ontology mapping exists
      PENDING_REVIEW:
        description: Suggested mapping awaiting review
      IN_PROGRESS:
        description: Currently being curated
      NEEDS_EXPERT:
        description: Requires expert domain knowledge
      AMBIGUOUS:
        description: Multiple possible interpretations
      REJECTED:
        description: Determined to be invalid or duplicate

  MappingQualityEnum:
    permissible_values:
      EXACT_MATCH:
        description: Direct exact match to ontology term
      SYNONYM_MATCH:
        description: Matches known synonym in ontology
      CLOSE_MATCH:
        description: Semantically close but not exact
      MANUAL_CURATION:
        description: Manually curated by expert
      LLM_ASSISTED:
        description: Mapping suggested by LLM, human-verified
      PROVISIONAL:
        description: Tentative mapping needing verification

  MatchLevelEnum:
    permissible_values:
      EXACT:
        description: Direct string match with no normalization
      NORMALIZED:
        description: Chemical normalization applied (hydrate strip, formula fix, catalog removal)
      FUZZY:
        description: Synonym matching or semantic similarity
      MANUAL:
        description: Expert or LLM-assisted curation
      UNMAPPABLE:
        description: Cannot reliably map to ontology
      UNKNOWN:
        description: Match method not recorded or imported from external source

  OntologySourceEnum:
    permissible_values:
      CHEBI:
        description: Chemical Entities of Biological Interest
      FOODON:
        description: Food Ontology
      NCIT:
        description: NCI Thesaurus
      MESH:
        description: Medical Subject Headings
      UBERON:
        description: Uber Anatomy Ontology
      ENVO:
        description: Environment Ontology

  CurationActionEnum:
    permissible_values:
      CREATED:
        description: Record created
      IMPORTED:
        description: Imported from external source
      MAPPED:
        description: Ontology mapping added
      SYNONYM_ADDED:
        description: Synonym added
      VALIDATED:
        description: Mapping validated
      CORRECTED:
        description: Mapping or data corrected
      MERGED:
        description: Merged with another record
      STATUS_CHANGED:
        description: Mapping status changed
      ANNOTATED:
        description: Notes or metadata added

  SynonymTypeEnum:
    permissible_values:
      EXACT_SYNONYM:
        description: Exact alternative name
      RELATED_SYNONYM:
        description: Related but not identical
      RAW_TEXT:
        description: Raw text from original data
      ABBREVIATION:
        description: Abbreviated form
      COMMON_NAME:
        description: Common or colloquial name
      SYSTEMATIC_NAME:
        description: Systematic chemical name
      HYDRATE_FORM:
        description: Chemical with hydrate notation (e.g., MgSO4•7H2O)
      CATALOG_VARIANT:
        description: Name with catalog/supplier code (e.g., NaCl Fisher S271-500)
      INCOMPLETE_FORMULA:
        description: Incomplete chemical formula (e.g., K2HPO instead of K2HPO4)
      ALTERNATE_FORM:
        description: Alternative chemical form (salt, ester, etc.)

  EvidenceTypeEnum:
    permissible_values:
      DATABASE_MATCH:
        description: Direct match in ontology database
      CURATOR_JUDGMENT:
        description: Expert curator decision
      LLM_SUGGESTION:
        description: LLM-generated suggestion
      LITERATURE:
        description: Based on literature evidence
      TEXT_SIMILARITY:
        description: Based on text similarity metrics
      CROSS_REFERENCE:
        description: Cross-reference to other database

  IngredientRoleEnum:
    description: Functional roles of ingredients in growth medium formulation
    permissible_values:
      CARBON_SOURCE:
        description: Provides organic carbon for biosynthesis and energy
      NITROGEN_SOURCE:
        description: Provides nitrogen for amino acids, nucleotides, etc.
      MINERAL:
        description: Inorganic mineral nutrient (e.g., phosphate, sulfate, magnesium)
      TRACE_ELEMENT:
        description: Micronutrient required in trace amounts (e.g., iron, zinc, cobalt)
      BUFFER:
        description: pH buffering agent to maintain stable pH
      VITAMIN_SOURCE:
        description: Provides vitamins or vitamin precursors
      SALT:
        description: Provides ionic strength and osmotic balance
      PROTEIN_SOURCE:
        description: Provides peptides, proteins, or amino acids
      AMINO_ACID_SOURCE:
        description: Provides specific amino acids
      SOLIDIFYING_AGENT:
        description: Gelling agent for solid media (e.g., agar)
      ENERGY_SOURCE:
        description: Primary energy substrate for chemotrophs
      ELECTRON_ACCEPTOR:
        description: Terminal electron acceptor for respiration (e.g., nitrate, oxygen)
      ELECTRON_DONOR:
        description: Electron donor for chemolithotrophs
      COFACTOR_PROVIDER:
        description: Provides enzyme cofactors or prosthetic groups
      REDOX_INDICATOR:
        description: pH-dependent redox indicator for anaerobic conditions (e.g., resazurin)
      PH_INDICATOR:
        description: pH indicator dye for monitoring medium acidity/alkalinity
      SELECTIVE_AGENT:
        description: Antimicrobial or selective agent for enrichment cultures
      SURFACTANT:
        description: Surfactant or detergent for emulsification

  CellularRoleEnum:
    description: Cellular and metabolic roles in microbial communities
    permissible_values:
      PRIMARY_DEGRADER:
        description: Main organism degrading target compound(s)
      REDUCTIVE_DEGRADER:
        description: Degrades compounds via reductive pathways (e.g., reductive dechlorination)
      OXIDATIVE_DEGRADER:
        description: Degrades compounds via oxidative pathways
      BIOTRANSFORMER:
        description: Transforms compound without complete degradation
      SYNERGIST:
        description: Enhances degradation by another organism
      BRIDGE_ORGANISM:
        description: Converts intermediates between community members
      ELECTRON_SHUTTLE:
        description: Mediates electron transfer between organisms or redox species
      DETOXIFIER:
        description: Removes or neutralizes toxic compounds
      COMMENSAL:
        description: Benefits from community without clear contribution
      COMPETITOR:
        description: Competes for nutrients or ecological niche

  CitationTypeEnum:
    description: Type of reference or citation
    permissible_values:
      PEER_REVIEWED_PUBLICATION:
        description: Peer-reviewed journal article or conference paper
      PREPRINT:
        description: Preprint or non-peer-reviewed manuscript
      DATABASE_ENTRY:
        description: Reference to database record or entry
      TECHNICAL_REPORT:
        description: Technical report, manual, or documentation
      MANUAL_CURATION:
        description: Expert manual curation without specific publication
      COMPUTATIONAL_PREDICTION:
        description: Computational inference or prediction

  SolutionTypeEnum:
    description: Type of solution for mixture ingredients (stock solutions, pre-mixes)
    permissible_values:
      VITAMIN_MIX:
        description: Pre-mixed vitamin solution (e.g., vitamin B12 solution, biotin mix)
      TRACE_METAL_MIX:
        description: Pre-mixed trace element or metal solution
      AMINO_ACID_MIX:
        description: Pre-mixed amino acid solution
      BUFFER_SOLUTION:
        description: Pre-prepared buffer solution (e.g., phosphate buffer, HEPES buffer)
      CARBON_SOURCE_MIX:
        description: Pre-mixed carbon source solution
      MINERAL_STOCK:
        description: Concentrated mineral stock solution
      COFACTOR_MIX:
        description: Pre-mixed cofactor or enzyme supplement solution
      COMPLEX_UNDEFINED:
        description: Complex undefined mixture (e.g., yeast extract, peptone)
      OTHER:
        description: Other type of pre-mixed solution

  IngredientTypeEnum:
    description: Classification of ingredient entry type
    permissible_values:
      SINGLE_INGREDIENT:
        description: >-
          Pure chemical compound or single ingredient (e.g., NaCl, agar, glucose, water).
          Can be mapped to chemical ontologies like CHEBI.
      DEFINED_MEDIUM:
        description: >-
          Complete medium formulation or recipe with multiple ingredients
          (e.g., R2A agar, LB broth, Marine agar 2216, Oatmeal agar).
          Should cross-reference to CultureMech for full recipe.
      UNDEFINED_MIXTURE:
        description: >-
          Complex mixture of unknown or variable composition
          (e.g., yeast extract, peptone, soil extract).
          Components not fully characterized.
      STOCK_SOLUTION:
        description: >-
          Pre-mixed solution of defined ingredients
          (e.g., vitamin B12 solution, trace metal mix).
          Components known but premixed for convenience.

  VariantTypeEnum:
    description: >-
      Classification of ingredient variant in hierarchy.
      Indicates the type of relationship to parent ingredient.
    permissible_values:
      BASE_CHEMICAL:
        description: >-
          Parent/base form of chemical in hierarchy.
          Example: Water (base) as parent of tap/distilled/double-distilled variants.
      HYDRATE:
        description: >-
          Hydrated crystalline form of compound.
          Example: CaCl2·2H2O vs CaCl2 (anhydrous).
      STEREOISOMER:
        description: >-
          Different spatial arrangement of atoms (stereochemistry).
          Example: D-glucose vs L-glucose, D-biotin vs L-biotin.
      PURIFIED:
        description: >-
          Standard purified/distilled form.
          Example: Distilled water (<1 µS/cm conductivity).
      ULTRA_PURIFIED:
        description: >-
          Higher purity variant than standard purified form.
          Example: Double distilled water (<0.1 µS/cm, 10x purer than distilled).
      TAP:
        description: >-
          Impure tap water variant containing chlorine and minerals.
          Example: Tap water (municipal water supply).
      DEMINERALIZED:
        description: >-
          Demineralized/deionized variant (ion exchange process).
          Example: Demineralized water, DI water.
      SALT:
        description: >-
          Salt form of compound (different counterion).
          Example: Sodium phosphate vs potassium phosphate.
      ANHYDROUS:
        description: >-
          Water-free (anhydrous) form of compound.
          Example: CaCl2 (anhydrous) vs CaCl2·2H2O (dihydrate).
