id: https://w3id.org/mediaingredientmech
name: mediaingredientmech-schema
title: MediaIngredientMech Schema
description: >-
  LinkML schema for curating media ingredient ontology mappings with LLM assistance tracking.
  Provides structured workflow for mapping ingredients to CHEBI/FOODON terms with full audit trails.

license: MIT
see_also:
  - https://github.com/CultureBotAI/MediaIngredientMech
  - https://github.com/CultureBotAI/CultureMech

prefixes:
  linkml: https://w3id.org/linkml/
  mediaingredientmech: https://w3id.org/mediaingredientmech/
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  FOODON: http://purl.obolibrary.org/obo/FOODON_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MESH: http://id.nlm.nih.gov/mesh/
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  METPO: http://purl.obolibrary.org/obo/METPO_
  rdfs: http://www.w3.org/2000/01/rdf-schema#

default_prefix: mediaingredientmech
default_range: string

imports:
  - linkml:types
  # Shared, byte-identical Mech module: Discussion (knowledge gaps) + Dataset.
  # Vendored + sha-pinned across the Mech repos — see culturebotai-claw#7.
  - mech_shared

classes:
  IngredientCollection:
    tree_root: true
    description: Root container for all ingredient records
    attributes:
      generation_date:
        range: datetime
        description: Timestamp when this collection was generated
      total_count:
        range: integer
        description: Total number of ingredient records
      mapped_count:
        range: integer
        description: Number of mapped ingredients
      unmapped_count:
        range: integer
        description: Number of unmapped ingredients
      category:
        description: >-
          Categorization label for partitioned unmapped collections (e.g.
          PLACEHOLDER, COMPLEX_MEDIA, INCOMPLETE_FORMULA, OTHER,
          ALREADY_MAPPED). Set by scripts/categorize_unmapped.py; absent
          on the canonical mapped_ingredients.yaml / unmapped_ingredients.yaml.
      count:
        range: integer
        description: >-
          Record count for this categorized partition. Mirrors len(ingredients)
          when present.
      ingredients:
        range: IngredientRecord
        multivalued: true
        inlined_as_list: true
        description: List of all ingredient records

  IngredientRecord:
    tree_root: true
    description: >-
      Core record for a media ingredient with ontology mapping, synonyms, and curation history.
      Represents either a mapped ingredient (with an ontology CURIE identifier) or an
      unmapped ingredient (placeholder identifier, awaits curation).
      Can serve as root element for individual YAML files or as elements in IngredientCollection.
    attributes:
      identifier:
        identifier: true
        required: true
        description: >-
          Primary key for the record. For mapped ingredients this is the
          ontology CURIE (e.g. `CHEBI:26710`, `FOODON:3311109`, `cas:247167-54-0`,
          `kgmicrobe.compound:aburamycin_a`); for unmapped ingredients it is
          a generated `UNMAPPED_NNNN` placeholder. The nested
          `ontology_mapping.ontology_id` carries the same value for mapped
          records (and is absent for unmapped records).
      preferred_term:
        required: true
        description: Canonical name for this ingredient
      ontology_mapping:
        range: OntologyMapping
        description: Ontology term mapping (CHEBI/FOODON)
        # id↔label gate: makes `linkml-term-validator validate-data --labels`
        # verify ontology_label is the canonical OBO label for ontology_id.
        # No `range:` on purpose — a range-less binding triggers the label
        # check without an enum-membership check (which would need per-ontology
        # tree expansion). Id existence is covered by Engine B / OAK lookup.
        bindings:
          - binds_value_of: ontology_id
            obligation_level: REQUIRED
      synonyms:
        range: IngredientSynonym
        multivalued: true
        inlined_as_list: true
        description: Alternative names and raw text variants
      mapping_status:
        range: MappingStatusEnum
        required: true
        description: Current mapping status
      occurrence_statistics:
        range: OccurrenceStats
        description: Usage statistics across media recipes
      curation_history:
        range: CurationEvent
        multivalued: true
        inlined_as_list: true
        description: Audit trail of all curation actions
      notes:
        description: Free-text curation notes
      community_organism_roles:
        range: CommunityOrganismRoleAssignment
        multivalued: true
        inlined_as_list: true
        description: Role(s) this organism plays in a microbial community (e.g., PRIMARY_DEGRADER, SYNERGIST, COMPETITOR). Formerly `cellular_roles`; renamed to disambiguate from ingredient-level cellular metabolic roles.
      nutritional_roles:
        range: NutritionalRoleAssignment
        multivalued: true
        inlined_as_list: true
        description: What element or macronutrient this ingredient supplies to the medium (e.g., CARBON_SOURCE, SULFUR_SOURCE, VITAMIN_SOURCE). Facet 1 of 3 orthogonal ingredient-role facets — a single ingredient may carry multiple values (e.g., L-cysteine → AMINO_ACID_SOURCE + SULFUR_SOURCE).
      physicochemical_roles:
        range: PhysicochemicalRoleAssignment
        multivalued: true
        inlined_as_list: true
        description: Chemical or physical function this ingredient performs in the medium (e.g., BUFFER, CHELATOR, REDUCING_AGENT). Facet 2 of 3 orthogonal ingredient-role facets — independent of what element the ingredient supplies.
      cellular_metabolic_roles:
        range: CellularMetabolicRoleAssignment
        multivalued: true
        inlined_as_list: true
        description: Role of this ingredient inside/on the cultured microbe (e.g., SUBSTRATE, ELECTRON_DONOR, COFACTOR). Facet 3 of 3 orthogonal ingredient-role facets — often organism-conditional (e.g., ELECTRON_DONOR applies only for organisms that oxidize the compound for energy).
      solution_type:
        range: SolutionTypeEnum
        description: Type of solution if this is a stock/pre-mix rather than individual chemical
      chemical_properties:
        range: ChemicalProperties
        description: Chemical structure and properties (for CHEBI-mapped ingredients only)
      representative:
        description: >-
          `identifier` of the representative record if this record has been
          merged. Only set when mapping_status is REJECTED due to merge.
          Points to the canonical record representing this ingredient.
          (No pattern constraint: the merge-tracking feature is currently
          unused — when revived, point at the schema's canonical identifier
          format.)
      merged:
        multivalued: true
        description: >-
          List of record `identifier`s merged into this representative.
          Only set on records serving as merge targets. Tracks all records
          consolidated into this canonical representation.
          (No pattern constraint: see `representative` above.)
      ingredient_type:
        range: IngredientTypeEnum
        description: >-
          Classification of entry type: single chemical ingredient vs complex defined medium.
          SINGLE_INGREDIENT: Pure chemical (NaCl, agar, glucose).
          DEFINED_MEDIUM: Complete medium formulation/recipe (R2A agar, LB broth).
          UNDEFINED_MIXTURE: Complex mixture of unknown composition (yeast extract, peptone).
          STOCK_SOLUTION: Pre-mixed solution of defined ingredients.
      components:
        range: StockComponent
        multivalued: true
        inlined_as_list: true
        description: >-
          Recipe-level decomposition for a STOCK_SOLUTION or DEFINED_MEDIUM: the
          list of component ingredients (with concentration where known). Lets a
          named mixture (e.g. a trace-element or vitamin solution) be resolved to
          its constituents. Populate only from a verifiable recipe source; leave
          empty when the composition is unknown.
      culturemech_medium_name:
        description: >-
          Cross-reference to CultureMech medium name if this is a defined medium.
          Used to link complex media entries to their full recipe formulations.
      parent_ingredient:
        description: >-
          Reference to parent ingredient's `identifier` in the variant
          hierarchy. Used for variants: purity levels
          (tap/distilled/double-distilled water), hydrates (CaCl2·2H2O vs
          CaCl2), stereoisomers (D-glucose vs L-glucose). Enables queries
          like "find all media using any form of water".
          (No pattern constraint: the hierarchy feature is currently unused —
          when populated, expect the schema's canonical `identifier` format.)
      child_ingredients:
        multivalued: true
        description: >-
          List of child ingredient `identifier`s in the variant hierarchy.
          Parent record contains all children (e.g. Water → Tap water,
          Distilled water). Used to navigate hierarchy and query all variants.
          (No pattern constraint: see `parent_ingredient` above.)
      variant_type:
        range: VariantTypeEnum
        description: >-
          Classification of variant relationship to parent.
          Indicates why this ingredient is distinct from parent/siblings.
          Examples: PURIFIED (distilled), ULTRA_PURIFIED (double distilled), TAP (impure).
      variant_notes:
        description: >-
          Human-readable explanation of variant distinction from parent/siblings.
          Example: "Higher purity (10x, <0.1 µS/cm vs <1 µS/cm) than standard distilled water.
          Used for trace-metal sensitive work."
      role_inheritance:
        range: boolean
        description: >-
          If true, inherits the three role facets (nutritional_roles,
          physicochemical_roles, cellular_metabolic_roles) from the parent ingredient.
          Allows child variants to automatically get parent's roles while enabling
          variant-specific role overrides or restrictions.
      kg_microbe_node_id:
        description: >-
          KG-Microbe node ID for this ingredient when found in the KG exactly.
          Populated when the ingredient is present as a named node in the
          KG-Microbe mediadive graph (i.e. used as an ingredient in at
          least one KG-Microbe medium solution). The node ID is a CURIE
          using whichever scheme the KG-Microbe graph stores the entity
          under — most often `CHEBI:`, but also `mesh:`, `NCIT:`,
          `FOODON:`, `ENVO:`, or one of the kg-microbe registry prefixes
          (`kgmicrobe.compound:`, `kgmicrobe.ingredient:`).
        required: false
        pattern: "^[A-Za-z][A-Za-z0-9.]*:[A-Za-z0-9][A-Za-z0-9._~-]*$"
      environmental_context:
        range: EnvironmentContext
        multivalued: true
        required: false
        inlined_as_list: true
        description: >-
          Environmental contexts where this ingredient is relevant. Each entry
          pairs an ENVO term with a relevance qualifier explaining the
          association (natural source, selective agent, environment mimic,
          etc.). Enables cross-repository environment-driven queries with
          CommunityMech (`environment_term`) and CultureMech
          (`source_environment`). Optional; ubiquitous ingredients
          (water, glucose) typically have no entries.
        bindings:
          - binds_value_of: environment_term
            obligation_level: REQUIRED
      discussions:
        range: Discussion
        multivalued: true
        inlined_as_list: true
        description: >-
          Open questions, knowledge gaps, controversies, and curation todos
          attached to this ingredient (shared Discussion supertype; anchor
          `attaches_to` into e.g. `ontology_mapping#<term>`).
      datasets:
        range: Dataset
        multivalued: true
        inlined_as_list: true
        description: Public datasets (omics/sequence/phenotype) relevant to this ingredient.

  EnvironmentContext:
    description: >-
      Environmental context annotation for an ingredient. Links an
      ingredient to an ENVO environment with a relevance qualifier
      explaining why the ingredient is associated with that environment.
      Schema mirrors the legacy `MappedIngredient.environmental_context`
      class in mapped_ingredients_schema.yaml so cross-repo tooling can
      treat the two interchangeably.
    attributes:
      environment_term:
        required: true
        range: string
        pattern: "^ENVO:\\d{7,8}$"
        description: ENVO term CURIE (e.g. `ENVO:00000044` for peatland)
      environment_label:
        required: false
        range: string
        slot_uri: rdfs:label
        description: >-
          Canonical ENVO label for environment_term. Verified against the
          ontology by the id↔label gate; the free/relevance name lives in notes.
      relevance:
        required: true
        range: EnvironmentRelevanceEnum
        description: Why this ingredient is relevant to the specified environment
      notes:
        required: false
        range: string
        description: Additional context about the ingredient-environment relationship

  OntologyMapping:
    description: Mapping to an ontology term (CHEBI, FOODON, etc.)
    attributes:
      ontology_id:
        required: true
        description: >-
          Ontology term ID in CURIE format. Most rows use a standard
          uppercase-prefix / numeric-local form (e.g. `CHEBI:26710`), but
          the schema also accepts the lowercase / alphanumeric / dotted
          prefixes used elsewhere in this project for non-ontology
          identifiers and kg-microbe registry rows (`cas:247167-54-0`,
          `mesh:C028805`, `NCIT:C76253`, `kgmicrobe.compound:aburamycin_a`).
          Local IDs may contain letters, digits, `.`, `_`, `-`, and `~`.
        pattern: "^[A-Za-z][A-Za-z0-9.]*:[A-Za-z0-9][A-Za-z0-9._~-]*$"
      ontology_label:
        required: true
        slot_uri: rdfs:label
        description: >-
          Canonical OBO label for ontology_id (e.g. "sodium chloride" for
          CHEBI:26710). The id↔label gate verifies this equals the ontology's
          canonical label; abbreviations/formulas/free names (e.g. "NaCl")
          belong in preferred_term / synonyms, not here.
      ontology_source:
        range: OntologySourceEnum
        required: true
        description: Source ontology
      mapping_quality:
        range: MappingQualityEnum
        required: true
        description: Quality assessment of this mapping
      match_level:
        range: MatchLevelEnum
        description: Technical method used to find this mapping
      evidence:
        range: MappingEvidence
        multivalued: true
        inlined_as_list: true
        description: Evidence supporting this mapping

  ChemicalProperties:
    description: Chemical structure and properties for CHEBI-mapped ingredients
    attributes:
      cas_rn:
        description: >-
          Chemical Abstracts Service Registry Number (CAS-RN) in format XXX-XX-X or XXXX-XX-X.
          Primary chemical identifier used in regulatory and commercial contexts.
          Retrieved from CultureBotHT/MicroMediaParam mappings or external databases.
        pattern: "^\\d+-\\d+-\\d+$"
      molecular_formula:
        description: Molecular formula (e.g., H2O, C6H12O6)
      smiles:
        description: Simplified Molecular Input Line Entry System notation
      inchi:
        description: IUPAC International Chemical Identifier
      molecular_weight:
        range: float
        description: Molecular weight in g/mol
      pubchem_cid:
        range: integer
        minimum_value: 1
        description: >-
          PubChem Compound Identifier (CID), stored as a positive integer.
          Populated by the PubChem enrichment path in
          `scripts/enrich_chemical_properties.py` when chemical properties
          are sourced from PubChem rather than ChEBI.
      data_source:
        description: Source of chemical properties (e.g., ChEBI, PubChem, CultureBotHT/MicroMediaParam)
      retrieval_date:
        range: datetime
        description: When these properties were retrieved

  MappingEvidence:
    description: Evidence for an ontology mapping
    attributes:
      evidence_type:
        range: EvidenceTypeEnum
        required: true
        description: Type of evidence
      source:
        description: Source of evidence (e.g., database name, curator name)
      confidence_score:
        range: float
        description: Confidence score (0.0-1.0)
      notes:
        description: Additional context
      cas_rn:
        description: >-
          CAS Registry Number that supports this evidence row. Set by the
          CAS-RN cross-reference resolver (`evidence_type: CAS_RN_CROSS_REFERENCE`)
          when an ontology term was matched via its CAS-RN rather than label
          or synonym. Same format as `ChemicalProperties.cas_rn`.
        pattern: "^\\d+-\\d+-\\d+$"
      pmid:
        description: PubMed ID for MEDLINE citations (e.g., 12345678)
        pattern: "^[0-9]+$"
      doi:
        description: Digital Object Identifier (e.g., 10.1128/jb.00123-15)
        pattern: "^10\\.\\d{4,}/[-._;()/:A-Za-z0-9]+$"
      snippet:
        description: |
          Exact substring quoted from the cited abstract that supports
          this mapping. Used by linkml-reference-validator to detect
          AI-hallucinated evidence: every snippet must appear verbatim
          in the cached PubMed abstract for the given pmid/doi.
      supports:
        range: EvidenceSupportEnum
        description: |
          How the cited reference relates to the mapping claim.
          SUPPORT = abstract substantiates the mapping; PARTIAL =
          adjacent context only; REFUTE = contradicts; NO_EVIDENCE =
          reference cited but no relevant snippet extractable.
      explanation:
        description: |
          Curator (or LLM)'s rationale connecting the snippet to the
          mapping claim — separate from the verbatim snippet so the
          snippet stays validatable.

  IngredientSynonym:
    description: Alternative name or raw text variant for an ingredient
    attributes:
      synonym_text:
        required: true
        description: The synonym text
      synonym_type:
        range: SynonymTypeEnum
        description: Type of synonym
      source:
        description: Where this synonym came from (e.g., database, curator)
      occurrence_count:
        range: integer
        description: Number of times this variant appears

  OccurrenceStats:
    description: Statistics about ingredient usage across media
    attributes:
      total_occurrences:
        range: integer
        required: true
        description: Total number of occurrences across all media
      media_count:
        range: integer
        required: true
        description: Number of unique media containing this ingredient
      sample_media:
        multivalued: true
        description: Sample media names (for reference)
      concentration_range:
        description: Observed concentration range (if available)

  CurationEvent:
    description: Audit trail entry for a curation action
    attributes:
      timestamp:
        range: datetime
        required: true
        description: When this action occurred
      curator:
        required: true
        description: Who performed this action (username or system)
      action:
        range: string
        required: true
        pattern: "^[A-Z][A-Z0-9]*(_[A-Z0-9]+)*$"
        description: >-
          Type of curation action. Free-form SCREAMING_SNAKE_CASE label minted
          by the curation tool that produced this event. CurationActionEnum
          below documents well-known actions; new tools are free to introduce
          new labels (live data has 110+ distinct values).
      changes:
        description: Description of what changed
      previous_status:
        range: MappingStatusEnum
        description: Status before this action
      new_status:
        range: MappingStatusEnum
        description: Status after this action
      llm_assisted:
        range: boolean
        description: Whether LLM assistance was used
      llm_model:
        description: LLM model identifier (if llm_assisted=true)
      notes:
        description: Additional context for this action

  RoleCitation:
    description: Citation supporting a role assignment (DOI, publication, database reference)
    attributes:
      doi:
        description: Digital Object Identifier (e.g., 10.1128/jb.00123-15)
        pattern: "^10\\.\\d{4,}/[-._;()/:A-Za-z0-9]+$"
      pmid:
        description: PubMed ID for MEDLINE citations
      reference_text:
        description: Human-readable citation text
      reference_type:
        range: CitationTypeEnum
        description: Type of reference (peer-reviewed, database, manual curation, etc.)
      url:
        range: uri
        description: Web URL for the reference
      excerpt:
        description: Relevant excerpt or quote from the source
      curator_note:
        description: Curator's explanation of why this supports the role assignment

  CommunityOrganismRoleAssignment:
    description: Assignment of an organism-in-community role with supporting evidence (e.g., which member of a consortium plays the PRIMARY_DEGRADER or SYNERGIST role).
    attributes:
      role:
        range: CommunityOrganismRoleEnum
        required: true
        description: The community/ecological role of the organism (e.g., PRIMARY_DEGRADER, SYNERGIST, COMMENSAL, COMPETITOR).
      metabolic_context:
        description: Pathway or metabolic context (e.g., "denitrification", "aromatic degradation")
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

  NutritionalRoleAssignment:
    description: Assignment of a nutritional facet role (what element or macronutrient the ingredient supplies) with supporting evidence.
    attributes:
      role:
        range: NutritionalRoleEnum
        required: true
        description: The nutritional role (e.g., CARBON_SOURCE, SULFUR_SOURCE, VITAMIN_SOURCE).
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

  PhysicochemicalRoleAssignment:
    description: Assignment of a physicochemical facet role (the chemical or physical function the ingredient performs in the medium) with supporting evidence.
    attributes:
      role:
        range: PhysicochemicalRoleEnum
        required: true
        description: The physicochemical role (e.g., BUFFER, CHELATOR, REDUCING_AGENT).
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

  CellularMetabolicRoleAssignment:
    description: Assignment of a cellular-metabolic facet role (what the ingredient does inside or to the cultured microbe) with supporting evidence. Assignments in this facet are often organism-conditional (e.g., ELECTRON_DONOR applies only for organisms that oxidize the compound for energy); capture that in `metabolic_context`.
    attributes:
      role:
        range: CellularMetabolicRoleEnum
        required: true
        description: The cellular-metabolic role (e.g., SUBSTRATE, ELECTRON_DONOR, COFACTOR).
      metabolic_context:
        description: Pathway or organism context that scopes this assignment (e.g., "methanol → ELECTRON_DONOR in methylotrophs only", "sulfate → ELECTRON_ACCEPTOR under anaerobic sulfate reduction"). Important when a role only holds for a subset of organisms or conditions.
      confidence:
        range: float
        description: Confidence score for this role assignment (0.0-1.0)
      evidence:
        range: RoleCitation
        multivalued: true
        inlined_as_list: true
        description: Citations and references supporting this role
      notes:
        description: Additional context about this role assignment

  StockComponent:
    description: >-
      One constituent of a stock solution or defined medium recipe — a component
      ingredient with its concentration. Used in IngredientRecord.components to
      decompose a named mixture (e.g. a trace-element or vitamin solution) into
      its parts. Populate only from a verifiable recipe source.
    attributes:
      component_name:
        required: true
        description: Component ingredient name as listed in the recipe (e.g. "FeCl3 x 6 H2O").
      component_id:
        description: >-
          Identifier of the component when mapped to an ontology/registry term
          (e.g. CHEBI:..., or a registry CURIE). Omit when the component is
          unmapped. (No pattern constraint: components may be unmapped.)
      concentration_value:
        description: >-
          Amount/concentration of the component, kept as a string to preserve the
          source's formatting (e.g. "1.5", "0.1-0.5").
      concentration_unit:
        description: Unit for concentration_value (e.g. G_PER_L, MG_PER_L, M, MM, PERCENT).
      source:
        description: >-
          Provenance of this component entry (e.g. a CultureMech medium ID, a
          MediaDive solution ID, or a publication / DOI). Recording it keeps the
          recipe verifiable rather than fabricated.

enums:
  MappingStatusEnum:
    permissible_values:
      MAPPED:
        description: Has valid ontology mapping
      UNMAPPED:
        description: No ontology mapping exists
      PENDING_REVIEW:
        description: Suggested mapping awaiting review
      IN_PROGRESS:
        description: Currently being curated
      NEEDS_EXPERT:
        description: Requires expert domain knowledge
      AMBIGUOUS:
        description: Multiple possible interpretations
      REJECTED:
        description: Determined to be invalid or duplicate

  EnvironmentRelevanceEnum:
    description: >-
      Describes why an ingredient is relevant to a particular environment.
      Mirrors the enum in mapped_ingredients_schema.yaml.
    permissible_values:
      NATURAL_SOURCE:
        description: Ingredient is naturally found in or sourced from this environment
      REQUIRED_FOR_ORGANISM:
        description: Required for cultivating organisms from this environment
      SELECTIVE_AGENT:
        description: Selectively promotes growth of organisms from this environment
      ENVIRONMENT_MIMIC:
        description: Helps replicate the chemical conditions of this environment in vitro
      COMMONLY_USED:
        description: Commonly used in media targeting organisms from this environment

  MappingQualityEnum:
    permissible_values:
      EXACT_MATCH:
        description: Direct exact match to ontology term
      SYNONYM_MATCH:
        description: Matches known synonym in ontology
      CLOSE_MATCH:
        description: Semantically close but not exact
      MANUAL_CURATION:
        description: Manually curated by expert
      LLM_ASSISTED:
        description: Mapping suggested by LLM, human-verified
      PROVISIONAL:
        description: Tentative mapping needing verification
      NARROW_MATCH:
        description: >-
          Ontology term is narrower than the ingredient (more specific). Used
          when the ingredient name covers a class and the chosen term covers
          one instance/subtype of that class.
      BROAD_MATCH:
        description: Ontology term is broader than the ingredient (less specific).
      LEXICAL_MATCH:
        description: >-
          Lexical (string-level) match without semantic verification —
          typically a token-overlap or normalized-name match.
      CAS_RN_LOOKUP:
        description: >-
          Mapping resolved via CAS Registry Number lookup rather than ontology
          label/synonym match.
      FALLBACK_REGISTRY:
        description: >-
          Identity assigned via a registry-row fallback (`registry:` or
          `kgmicrobe.compound:` / `kgmicrobe.ingredient:`) when no direct
          ontology term is available.
      PLACEHOLDER:
        description: >-
          Mapping is a placeholder pending real curation (e.g. minted
          kg-microbe ingredient row, awaiting upgrade to CHEBI/FOODON/etc.).

  MatchLevelEnum:
    permissible_values:
      EXACT:
        description: Direct string match with no normalization
      NORMALIZED:
        description: Chemical normalization applied (hydrate strip, formula fix, catalog removal)
      FUZZY:
        description: Synonym matching or semantic similarity
      MANUAL:
        description: Expert or LLM-assisted curation
      UNMAPPABLE:
        description: Cannot reliably map to ontology
      UNKNOWN:
        description: Match method not recorded or imported from external source

  OntologySourceEnum:
    permissible_values:
      CHEBI:
        description: Chemical Entities of Biological Interest
      FOODON:
        description: Food Ontology
      NCIT:
        description: NCI Thesaurus
      MESH:
        description: Medical Subject Headings
      UBERON:
        description: Uber Anatomy Ontology
      ENVO:
        description: Environment Ontology
      MICRO:
        description: Microbiology vocabulary
      BTO:
        description: BRENDA Tissue Ontology
      CAS:
        description: >-
          CAS Registry — fallback identity when the ingredient has a CAS number
          but no resolved ontology term (paired with `cas:` prefix CURIEs).
      registry:
        description: >-
          Generic registry-row fallback used when an identity exists in a
          non-ontology registry tracked by the SSSOM pipeline.
      kgmicrobe.compound:
        description: >-
          kg-microbe compound registry row (placeholder identity awaiting
          upgrade to a CHEBI/MESH/etc. term).
      kgmicrobe.ingredient:
        description: >-
          kg-microbe ingredient registry row (placeholder identity awaiting
          upgrade to an ontology term).

  CurationActionEnum:
    description: >-
      Documentation-only reference list of well-known curation action labels.
      The `action` slot on CurationEvent has range `string` constrained by a
      SCREAMING_SNAKE_CASE pattern, not membership in this enum — curation
      tools mint new labels freely (live data has 117 distinct values as of
      2026-05-12). The 25 labels below cover the 9 baseline operation verbs
      plus the most frequent automated/classification/merge labels observed
      in live data (together >93% of all curation events). New tools should
      reuse one of these names when applicable rather than inventing a
      near-duplicate.
    permissible_values:
      # --- Baseline curation operations (semantic verbs) ---
      CREATED:
        description: Record minted by a curator or import tool.
      IMPORTED:
        description: Record imported from an external source.
      MAPPED:
        description: Ontology mapping added or replaced.
      ANNOTATED:
        description: Notes or freeform metadata added.
      CORRECTED:
        description: Mapping or data corrected (in response to a review finding).
      MERGED:
        description: Record merged with another record.
      STATUS_CHANGED:
        description: "`mapping_status` field changed."
      VALIDATED:
        description: Mapping validated against ontology or reference data.
      SYNONYM_ADDED:
        description: Single synonym added (cf. plural ADDED_SYNONYMS for batch).
      # --- Most frequent automated actions (live data) ---
      AUTO_CLASSIFY_INGREDIENT_TYPE:
        description: "Automated `ingredient_type` classification (single chemical, defined medium, mixture, stock)."
      AUTO_BACKFILL_CHEBI_CHEMISTRY:
        description: Automated backfill of molecular formula / SMILES / InChI from ChEBI.
      AUTO_BACKFILL_PUBCHEM_CHEMISTRY:
        description: Automated backfill of chemical properties from PubChem.
      ADDED_SYNONYMS:
        description: Batch synonym add (multiple synonyms in one event).
      ADDED_CAS_RN:
        description: CAS Registry Number added to a record.
      CAS_RN_ADDED:
        description: >-
          Legacy alias for ADDED_CAS_RN emitted by older tooling. Prefer
          ADDED_CAS_RN in new code.
      # --- Provenance of unmapped/placeholder records ---
      CREATED_AS_UNMAPPED:
        description: Record minted in the UNMAPPED state, awaiting ontology lookup.
      CREATED_FROM_CULTUREBOTHT:
        description: Record imported from the CultureBot HT pipeline.
      CREATED_FROM_CAS_LOOKUP:
        description: Record created after resolving an unmapped name via CAS lookup.
      CREATED_FROM_CAS_FALLBACK:
        description: Record created with a `cas:` fallback identity when no ontology term was found.
      CREATED_FROM_KGM_PLACEHOLDER:
        description: Record created from a kg-microbe placeholder ingredient row.
      # --- Classification & merge ---
      CLASSIFIED_UNDEFINED_MIXTURE:
        description: Classified as an undefined mixture (yeast extract, peptone, ...).
      CLASSIFIED_STOCK_SOLUTION:
        description: Classified as a stock solution / premix.
      CLASSIFIED_DEFINED_MEDIUM:
        description: Classified as a complete defined-medium recipe.
      MERGED_FROM_DUPLICATES:
        description: Duplicate records consolidated into this representative.
      BACKFILL_PARENT_CHEBI:
        description: "`parent_ingredient` populated by lookup against CHEBI hierarchy."

  SynonymTypeEnum:
    permissible_values:
      EXACT_SYNONYM:
        description: Exact alternative name
      RELATED_SYNONYM:
        description: Related but not identical
      EXACT:
        description: >-
          Shorthand alias for EXACT_SYNONYM emitted by some import tooling;
          retained for backward compatibility with existing records.
      RELATED:
        description: >-
          Shorthand alias for RELATED_SYNONYM emitted by some import tooling;
          retained for backward compatibility with existing records.
      RAW_TEXT:
        description: Raw text from original data
      ABBREVIATION:
        description: Abbreviated form
      COMMON_NAME:
        description: Common or colloquial name
      SYSTEMATIC_NAME:
        description: Systematic chemical name
      HYDRATE_FORM:
        description: Chemical with hydrate notation (e.g., MgSO4•7H2O)
      CATALOG_VARIANT:
        description: Name with catalog/supplier code (e.g., NaCl Fisher S271-500)
      INCOMPLETE_FORMULA:
        description: Incomplete chemical formula (e.g., K2HPO instead of K2HPO4)
      ALTERNATE_FORM:
        description: Alternative chemical form (salt, ester, etc.)

  EvidenceTypeEnum:
    permissible_values:
      DATABASE_MATCH:
        description: Direct match in ontology database
      CURATOR_JUDGMENT:
        description: Expert curator decision
      LLM_SUGGESTION:
        description: LLM-generated suggestion
      LITERATURE:
        description: Based on literature evidence
      TEXT_SIMILARITY:
        description: Based on text similarity metrics
      CROSS_REFERENCE:
        description: Cross-reference to other database
      LEXICAL_MATCH:
        description: >-
          Lexical (token-overlap / normalized-name) match against an ontology
          label or synonym.
      CAS_RN_CROSS_REFERENCE:
        description: >-
          Identity established via CAS Registry Number cross-reference rather
          than ontology label match.
      MANUAL_CURATION:
        description: >-
          Manually curated evidence supplied by a human reviewer (distinct
          from CURATOR_JUDGMENT, which records the decision rather than the
          source of evidence).
      MANUAL_REVIEW:
        description: Identity confirmed during a manual review pass.
      CURATOR_CONFIRMED_SYNONYM:
        description: Curator confirmed a synonym match found by tooling.

  EvidenceSupportEnum:
    description: How a cited reference relates to the claim it is attached to
    permissible_values:
      SUPPORT:
        description: Reference substantiates the claim
      PARTIAL:
        description: Reference touches adjacent context but does not directly substantiate
      REFUTE:
        description: Reference contradicts the claim
      NO_EVIDENCE:
        description: Reference cited but no extractable supporting snippet
      WRONG_STATEMENT:
        description: |
          Reference is incorrectly cited (placeholder for legacy data;
          flagged for cleanup)

  NutritionalRoleEnum:
    description: >-
      What element or macronutrient an ingredient supplies to the medium.
      One of three orthogonal role facets (with PhysicochemicalRoleEnum and
      CellularMetabolicRoleEnum). A single ingredient may carry multiple
      nutritional roles (e.g. L-cysteine supplies both amino-acid and sulfur).
    permissible_values:
      CARBON_SOURCE:
        description: Provides organic carbon for biosynthesis and energy.
        mappings:
          - METPO:2000006
      NITROGEN_SOURCE:
        description: Provides nitrogen for amino acids, nucleotides, and other biomass components.
        mappings:
          - METPO:2000014
      SULFUR_SOURCE:
        description: Provides sulfur (typically for cysteine, methionine, Fe-S clusters).
        mappings:
          - METPO:2000020
      PHOSPHATE_SOURCE:
        description: Provides phosphate for nucleotides, phospholipids, and energy carriers.
      IRON_SOURCE:
        description: Provides iron (typically for cytochromes, Fe-S clusters, and other metalloproteins).
      TRACE_ELEMENT:
        description: Provides a micronutrient required in trace amounts (e.g., zinc, cobalt, manganese, molybdenum).
      MINERAL_SOURCE:
        description: >-
          Provides a bulk inorganic mineral nutrient not covered by a more
          specific element-source value — in practice the macronutrient cations
          magnesium, calcium, potassium, and sodium (e.g., MgCl2, CaCl2, KCl,
          NaCl). Prefer the specific value (PHOSPHATE_SOURCE, IRON_SOURCE,
          SULFUR_SOURCE, TRACE_ELEMENT) whenever the salient nutrient is one of
          those; MINERAL_SOURCE is the residual bucket, mirroring how
          TRACE_ELEMENT buckets the micronutrient metals.
      VITAMIN_SOURCE:
        description: Provides vitamins or vitamin precursors.
        meaning: CHEBI:33229
      AMINO_ACID_SOURCE:
        description: Provides one or more specific amino acids as building blocks.
        mappings:
          - CHEBI:33709
      PROTEIN_SOURCE:
        description: Provides peptides, proteins, or complex amino-acid mixtures (e.g., yeast extract, peptone, tryptone).
        mappings:
          - CHEBI:36080
      COFACTOR_PROVIDER:
        description: Supplies enzyme cofactors or prosthetic groups to the medium (the compound acts as a source; contrast with CellularMetabolicRoleEnum.COFACTOR, which is the intracellular role).
        mappings:
          - CHEBI:23357
      ENERGY_SOURCE:
        description: Primary energy substrate for chemotrophic growth.
        mappings:
          - METPO:2000010
      LIGHT_SOURCE:
        description: Radiant-energy source for phototrophic growth. No CHEBI or METPO term yet describes a radiant-energy *supply* role (METPO:1000656 is the organism metabolic-mode `photoautotrophic`, not a supply-side role); METPO submission pending.

  PhysicochemicalRoleEnum:
    description: >-
      Chemical or physical function an ingredient performs in the medium,
      independent of what element it supplies. One of three orthogonal role
      facets (with NutritionalRoleEnum and CellularMetabolicRoleEnum).
    permissible_values:
      BUFFER:
        description: Maintains stable pH via a conjugate acid–base system.
        meaning: CHEBI:35225
      SOLIDIFYING_AGENT:
        description: Gelling agent for solid or semi-solid media (e.g., agar, gellan gum, silica gel).
      CHELATOR:
        description: Sequesters metal ions to control availability, toxicity, or precipitation (e.g., EDTA, NTA, citrate).
        meaning: CHEBI:38161
      SURFACTANT:
        description: Reduces surface tension for emulsification, solubilization, or membrane permeabilization (e.g., Tween, Triton X-100).
        meaning: CHEBI:35195
        mappings:
          - CHEBI:63046
      REDUCING_AGENT:
        description: Lowers the redox potential of the medium (e.g., sodium sulfide, cysteine, thioglycolate, dithiothreitol).
        meaning: CHEBI:63247
      OXIDIZING_AGENT:
        description: Raises the redox potential of the medium.
        meaning: CHEBI:63248
      PH_INDICATOR:
        description: Colorimetric acid–base indicator dye (e.g., phenol red, bromothymol blue).
        meaning: CHEBI:50407
      REDOX_INDICATOR:
        description: Colorimetric indicator of redox potential (e.g., resazurin turns pink under mildly oxidizing conditions).
        mappings:
          - CHEBI:47867
      SELECTIVE_AGENT:
        description: Antimicrobial or otherwise selective agent used to enrich for or against particular organisms (e.g., antibiotics, bile salts, high salt, azide).
        mappings:
          - CHEBI:33281
          - CHEBI:33282
          - CHEBI:35718
      ANTIFOAM:
        description: Suppresses foaming in aerated or vigorously mixed cultures (e.g., silicone antifoam, polypropylene glycol).
        meaning: CHEBI:77973
      OSMOTIC_AGENT:
        description: >-
          Contributes primarily to the osmotic strength of the medium (e.g., NaCl at high concentration, sucrose, glycerol as osmolyte).
          NOTE: shares `mappings: CHEBI:25728 (osmolyte)` with CellularMetabolicRoleEnum.OSMOPROTECTANT. Auto-classifiers driven by the SSSOM must NOT fan a single CHEBI:25728 annotation out to both facets — this is a medium-side role, whereas OSMOPROTECTANT is an intracellular, organism-conditional role. Assign OSMOPROTECTANT only when there is organism-context evidence.
        mappings:
          - CHEBI:25728
      PRECIPITATION_INHIBITOR:
        description: Prevents precipitation of otherwise poorly-soluble medium components (e.g., citrate keeping iron soluble at neutral pH).

  CellularMetabolicRoleEnum:
    description: >-
      Role of the ingredient inside or on the cultured microbe(s) — the
      compound's metabolic fate or biochemical function at the cell level.
      One of three orthogonal role facets (with NutritionalRoleEnum and
      PhysicochemicalRoleEnum). Values in this facet are often
      organism-conditional (e.g. ELECTRON_DONOR applies only for organisms
      that oxidize the compound for energy; methanol is an electron donor
      for methylotrophs but only a carbon source for others).
    permissible_values:
      SUBSTRATE:
        description: Consumed by the organism for biosynthesis, energy, or both (general-purpose substrate role).
      ELECTRON_DONOR:
        description: Electron donor for chemolithotrophic or heterotrophic energy metabolism (organism-conditional).
        meaning: CHEBI:15022
      ELECTRON_ACCEPTOR:
        description: Terminal electron acceptor for respiration (e.g., nitrate, oxygen, sulfate; organism-conditional).
        meaning: CHEBI:17654
      COFACTOR:
        description: Acts as an intracellular enzyme cofactor (contrast with NutritionalRoleEnum.COFACTOR_PROVIDER, the supply-side role).
        meaning: CHEBI:23357
      PROSTHETIC_GROUP_PRECURSOR:
        description: Precursor for a covalently-bound cofactor / prosthetic group (e.g., δ-aminolevulinate for heme). Note the mapping below points at the parent role `prosthetic group` — CHEBI has no dedicated `prosthetic group precursor` role class, so the mapping is a hierarchy pointer, not identity.
        mappings:
          - CHEBI:26348
      MEMBRANE_COMPONENT:
        description: Incorporated into cell membranes (e.g., fatty acids, sterols, isoprenoid lipids).
      OSMOPROTECTANT:
        description: >-
          Accumulated intracellularly to balance external osmotic stress (e.g., glycine betaine, ectoine, trehalose). Organism-conditional — assign only with organism-context evidence (e.g., "glycine betaine is imported and accumulated as an osmoprotectant by <organism>").
          NOTE: shares `mappings: CHEBI:25728 (osmolyte)` with PhysicochemicalRoleEnum.OSMOTIC_AGENT. See that value's description for cross-facet guidance.
        mappings:
          - CHEBI:25728
      INDUCER:
        description: Triggers expression of specific genes or pathways when present (e.g., IPTG, arabinose).
      INHIBITOR:
        description: Suppresses growth or a specific pathway (e.g., antibiotics targeting cellular processes).
        meaning: CHEBI:35222
      QUENCHER:
        description: Absorbs or dissipates a signal (e.g., quenches fluorescence, radicals, or light).

  CommunityOrganismRoleEnum:
    description: Role an organism plays in a microbial community (formerly `CellularRoleEnum`; renamed 2026-07-19 to disambiguate from cell-level metabolic roles of ingredients — these values describe organisms, not ingredients).
    permissible_values:
      PRIMARY_DEGRADER:
        description: Main organism degrading target compound(s)
      REDUCTIVE_DEGRADER:
        description: Degrades compounds via reductive pathways (e.g., reductive dechlorination)
      OXIDATIVE_DEGRADER:
        description: Degrades compounds via oxidative pathways
      BIOTRANSFORMER:
        description: Transforms compound without complete degradation
      SYNERGIST:
        description: Enhances degradation by another organism
      BRIDGE_ORGANISM:
        description: Converts intermediates between community members
      ELECTRON_SHUTTLE:
        description: Mediates electron transfer between organisms or redox species
      DETOXIFIER:
        description: Removes or neutralizes toxic compounds
      COMMENSAL:
        description: Benefits from community without clear contribution
      COMPETITOR:
        description: Competes for nutrients or ecological niche

  CitationTypeEnum:
    description: Type of reference or citation
    permissible_values:
      PEER_REVIEWED_PUBLICATION:
        description: Peer-reviewed journal article or conference paper
      PREPRINT:
        description: Preprint or non-peer-reviewed manuscript
      DATABASE_ENTRY:
        description: Reference to database record or entry
      TECHNICAL_REPORT:
        description: Technical report, manual, or documentation
      MANUAL_CURATION:
        description: Expert manual curation without specific publication
      COMPUTATIONAL_PREDICTION:
        description: Computational inference or prediction

  SolutionTypeEnum:
    description: Type of solution for mixture ingredients (stock solutions, pre-mixes)
    permissible_values:
      VITAMIN_MIX:
        description: Pre-mixed vitamin solution (e.g., vitamin B12 solution, biotin mix)
      TRACE_METAL_MIX:
        description: Pre-mixed trace element or metal solution
      AMINO_ACID_MIX:
        description: Pre-mixed amino acid solution
      BUFFER_SOLUTION:
        description: Pre-prepared buffer solution (e.g., phosphate buffer, HEPES buffer)
      CARBON_SOURCE_MIX:
        description: Pre-mixed carbon source solution
      MINERAL_STOCK:
        description: Concentrated mineral stock solution
      COFACTOR_MIX:
        description: Pre-mixed cofactor or enzyme supplement solution
      COMPLEX_UNDEFINED:
        description: Complex undefined mixture (e.g., yeast extract, peptone)
      OTHER:
        description: Other type of pre-mixed solution

  IngredientTypeEnum:
    description: Classification of ingredient entry type
    permissible_values:
      SINGLE_INGREDIENT:
        description: >-
          Pure chemical compound or single ingredient (e.g., NaCl, agar, glucose, water).
          Can be mapped to chemical ontologies like CHEBI.
      DEFINED_MEDIUM:
        description: >-
          Complete medium formulation or recipe with multiple ingredients
          (e.g., R2A agar, LB broth, Marine agar 2216, Oatmeal agar).
          Should cross-reference to CultureMech for full recipe.
      UNDEFINED_MIXTURE:
        description: >-
          Complex mixture of unknown or variable composition
          (e.g., yeast extract, peptone, soil extract).
          Components not fully characterized.
      STOCK_SOLUTION:
        description: >-
          Pre-mixed solution of defined ingredients
          (e.g., vitamin B12 solution, trace metal mix).
          Components known but premixed for convenience.

  VariantTypeEnum:
    description: >-
      Classification of ingredient variant in hierarchy.
      Indicates the type of relationship to parent ingredient.
    permissible_values:
      BASE_CHEMICAL:
        description: >-
          Parent/base form of chemical in hierarchy.
          Example: Water (base) as parent of tap/distilled/double-distilled variants.
      HYDRATE:
        description: >-
          Hydrated crystalline form of compound.
          Example: CaCl2·2H2O vs CaCl2 (anhydrous).
      STEREOISOMER:
        description: >-
          Different spatial arrangement of atoms (stereochemistry).
          Example: D-glucose vs L-glucose, D-biotin vs L-biotin.
      PURIFIED:
        description: >-
          Standard purified/distilled form.
          Example: Distilled water (<1 µS/cm conductivity).
      ULTRA_PURIFIED:
        description: >-
          Higher purity variant than standard purified form.
          Example: Double distilled water (<0.1 µS/cm, 10x purer than distilled).
      TAP:
        description: >-
          Impure tap water variant containing chlorine and minerals.
          Example: Tap water (municipal water supply).
      DEMINERALIZED:
        description: >-
          Demineralized/deionized variant (ion exchange process).
          Example: Demineralized water, DI water.
      SALT:
        description: >-
          Salt form of compound (different counterion).
          Example: Sodium phosphate vs potassium phosphate.
      ANHYDROUS:
        description: >-
          Water-free (anhydrous) form of compound.
          Example: CaCl2 (anhydrous) vs CaCl2·2H2O (dihydrate).
